<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            --yellow: rgb(211, 200, 3);
            --blue: rgb(2, 2, 123);
            --red: rgb(231, 9, 9);
            --green: rgb(14, 204, 14);
        }

        .container {
            width: 700px;
            height: 700px;
            background-color: white;
        }

        body {
            background-color: aliceblue;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }


        /* First row */

        .firstRow,
        .thirdRow {
            display: flex;
            height: 40%;

        }

        .firstRow>.blue {
            background-color: var(--blue);
            height: 100%;
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 1px 1px 10px 0 black;
        }

        .thirdRow>.red {
            background-color: var(--red);
            height: 100%;
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 1px 1px 10px 0 black;
        }

        .firstRow>.blue>div,
        .firstRow>.yellow>div,
        .thirdRow>.red>div,
        .thirdRow>.green>div {
            width: 80%;
            height: 80%;
            background-color: white;
            border-radius: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 50px;
        }

        .firstRow>.blue>div>div {
            background-color: var(--blue);
            border-radius: 100%;
        }


        .thirdRow>.red>div>div {
            background-color: var(--red);
            border-radius: 100%;
        }

        .firstRow>.yellow>div>div {
            background-color: var(--yellow);
            border-radius: 100%;
        }

        .thirdRow>.green>div>div {
            background-color: var(--green);
            border-radius: 100%;
        }

        .firstRow>.yellow {
            background-color: var(--yellow);
            height: 100%;
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 1px 1px 10px 0 black;
        }


        .thirdRow>.green {
            background-color: var(--green);
            height: 100%;
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 1px 1px 10px 0 black;
        }

        .middle {
            width: 20%;

            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;

        }


        .middle>div {
            border: 1px solid black;
        }

        /* Second Row */
        .secondRow {
            height: 20%;
            display: flex;
        }

        .secondRow>.left,
        .secondRow>.right {
            width: 40%;
            height: 100%;
            display: grid;

            grid-template-columns: repeat(6, 1fr);
        }

        .left>div,
        .right>div {
            border: 1px solid black;
        }

        .home {
            width: 20%;
            border: 1px solid black;
        }
    </style>
</head>
