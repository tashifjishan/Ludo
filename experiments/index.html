    <title>Document</title>
    <link
      rel="stylesheet"

    <style>
      * {
        margin: 0;
        padding: 0;
        --red: #ec1c22;
        --yellow: #fedf16;
        --green: #00a048;
        --blue: #22b0fd;

        --width: 700px;
        --height: 700px;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background-color: rgb(255, 166, 0);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 10px;
      }
    </style>
    <style>
      .ludo {
        display: grid;
        width: var(--width);
        height: var(--height);
        background-color: white;
        grid-template-columns: repeat(15, 1fr);
        grid-template-rows: repeat(15, 1fr);
        grid-template-areas:
          "red  red  red  red  red  red  c23  c24  c25  grn  grn  grn  grn  grn  grn"
          "red  red  red  red  red  red  c22  g1   c26  grn  grn  grn  grn  grn  grn"
          "red  red  red  red  red  red  c21  g2   c27  grn  grn  grn  grn  grn  grn"
          "red  red  red  red  red  red  c20  g3   c28  grn  grn  grn  grn  grn  grn"
          "red  red  red  red  red  red  c19  g4   c29  grn  grn  grn  grn  grn  grn"
          "red  red  red  red  red  red  c18  g5   c30  grn  grn  grn  grn  grn  grn"
          "c12  c13  c14  c15  c16  c17  h    h    h    c31  c32  c33  c34  c35  c36"
          "c11  r1   r2   r3   r4   r5   h    h    h    y5   y4   y3   y2   y1   c37"
          "c10  c9   c8   c7   c6   c5   h    h    h    c43  c42  c41  c40  c39  c38"
          "blu  blu  blu  blu  blu  blu  c4   b5   c44  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c3   b4   c45  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c2   b3   c46  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c1   b2   c47  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c52  b1   c48  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c51  c50  c49  ylo  ylo  ylo  ylo  ylo  ylo";
      }
      .ludo > div {
        border: 1px solid rgba(0, 0, 0, 0.426);
      }

      .home {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .home > div {
        background-color: white;
        width: 70%;
        height: 70%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 20px;
        padding: 40px;
      }
      .home > div > div {
        border-radius: 50%;
      }
      div[cellNo]:has(> :nth-child(2)) {
        display: flex;
        align-items: center;
        overflow: hidden;
        /* overflow: hidden; */
      }

      div[cellNo]:has(> :nth-child(2)) img {
        position: relative;
        width: 30px;
        height: 40px;
        object-fit: contain;
        margin-left: -1.4rem;
      }

      div[cellNo]:has(> :nth-child(5))::after {
        content: "4+";
        background-color: rgb(255, 73, 73);
        position: absolute;
        padding: 4px 4px;
        font-weight: bold;
        font-size: 16px;
        font-family: monospace;
        display: block;
        top: 0;
        right: 0;
        color: white;
        z-index: 2;
      }

      div[cellNo]:has(> :nth-child(2)) img:first-child {
        margin-left: 0;
      }
      div[cellNo] {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      div[cellNo] img {
        position: absolute;
        bottom: 0;
        z-index: 1;
      }

      .stopCell {
        background-image: url("./images/star.png");
        background-size: contain;
      }


      /* Win Cell */
      .winCell{
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
        grid-template-areas: 
        "green green"
        "red yellow"
        "blue blue"
        ;
        
      }
      .winCell>div{
        
        
      }
      .winCell>.green{
        grid-area: green;
        
        transform: rotate(180deg);
      }
      .winCell>.blue{
        grid-area: blue;
        
        
      }
      .winCell>.red{
        grid-area: red;
        
        
        transform: translate(-10px) rotate(90deg);
      }
      .winCell>.yellow{
        grid-area: yellow;
        
        transform: rotate(270deg) translateY(10px);
      }
    </style>
  </head>
