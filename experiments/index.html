    <style>
      * {
        margin: 0;
        padding: 0;
        --red: #ec1c22;
        --yellow: #fedf16;
        --green: #00a048;
        --blue: #22b0fd;

        --width: 700px;
        --height: 700px;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background-color: rgb(255, 166, 0);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 10px;
      }

    <style>

        display: grid;
        width: var(--width);
        height: var(--height);
        background-color: white;
        grid-template-columns: repeat(15, 1fr);
        grid-template-rows: repeat(15, 1fr);

          "red  red  red  red  red  red  c19  g4   c29  grn  grn  grn  grn  grn  grn"
          "red  red  red  red  red  red  c18  g5   c30  grn  grn  grn  grn  grn  grn"
          "c12  c13  c14  c15  c16  c17  h    h    h    c31  c32  c33  c34  c35  c36"
          "c11  r1   r2   r3   r4   r5   h    h    h    y5   y4   y3   y2   y1   c37"
          "c10  c9   c8   c7   c6   c5   h    h    h    c43  c42  c41  c40  c39  c38"
          "blu  blu  blu  blu  blu  blu  c4   b5   c44  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c3   b4   c45  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c2   b3   c46  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c1   b2   c47  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c52  b1   c48  ylo  ylo  ylo  ylo  ylo  ylo"
          "blu  blu  blu  blu  blu  blu  c51  c50  c49  ylo  ylo  ylo  ylo  ylo  ylo";
      }
      .ludo > div {
        border: 1px solid rgba(0, 0, 0, 0.426);
      }

      .home {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .home > div {
        background-color: white;
        width: 70%;
        height: 70%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 20px;
        padding: 40px;
      }
      .home > div > div {
        border-radius: 50%;
      }
      div[cellNo]:has(> :nth-child(2)) {
        display: flex;
        align-items: center;
        overflow: hidden;
        /* overflow: hidden; */
      }

      div[cellNo]:has(> :nth-child(2)) img {
        position: relative;
        width: 30px;
        height: 40px;
        object-fit: contain;
        margin-left: -1.4rem;
      }

      div[cellNo]:has(> :nth-child(5))::after {
        content: "4+";
        background-color: rgb(255, 73, 73);
        position: absolute;
        padding: 4px 4px;
        font-weight: bold;
        font-size: 16px;
        font-family: monospace;
        display: block;
        top: 0;
        right: 0;
        color: white;
        z-index: 2;
      }

      div[cellNo]:has(> :nth-child(2)) img:first-child {
        margin-left: 0;
      }
      div[cellNo] {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      div[cellNo] img {
        position: absolute;
        bottom: 0;
        z-index: 1;
      }

      .stopCell {
        background-image: url("./images/star.png");
        background-size: contain;
      }

      /* Win Cell */
      .winCell {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
        grid-template-areas:
          "green green"
          "red yellow"
          "blue blue";
      }
      .winCell > div {
      }
      .winCell > .green {
        grid-area: green;

        transform: rotate(180deg);
      }
      .winCell > .blue {
        grid-area: blue;
      }
      .winCell > .red {
        grid-area: red;

        transform: translate(-10px) rotate(90deg);
      }
      .winCell > .yellow {
        grid-area: yellow;

        transform: rotate(270deg) translateY(10px);
      }

      .flashAnimate {
        animation-name: flash;
        animation-duration: 300ms;
        animation-iteration-count: infinite;
        animation-timing-function: ease-in-out;
        animation-direction: alternate;
      }

      @keyframes flash {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0.6;
        }
      }
    </style>
  </head>

    <script>
      const allCells = document.querySelectorAll("div[cellNo]");

      const account = {
        red: {
          tokens: Array.from(document.querySelectorAll("img[token='red']")),
          tokensWon: [],
          path: [
            ...Array.from(
              { length: 51 },
              (_, i) => ((i + 12) % 52) + 1,
            ),
            "r1",
            "r2",
            "r3",
            "r4",
            "r5",
            "redHome",
          ],
          tokensPos: new Map(
            Array.from(document.querySelectorAll("img[token='red']")).map(
              (el) => [el, null],
            ),
          ),
        },
        green: {
          tokens: Array.from(document.querySelectorAll("img[token='green']")),
          tokensWon: [],
          path: [
            ...Array.from(
              { length: 51 },
              (_, i) => ((i + 25) % 52) + 1
            ),
            "g1",
            "g2",
            "g3",
            "g4",
            "g5",
            "greenHome",
          ],
          tokensPos: new Map(
            Array.from(document.querySelectorAll("img[token='green']")).map(
              (el) => [el, null],
            ),
          ),
        },
        blue: {
          tokens: Array.from(document.querySelectorAll("img[token='blue']")),
          tokensWon: [],
          path: [
            ...Array.from(
              { length: 51 },
              (_, i) => ((i + 51) % 52) + 1
            ),
            "b1",
            "b2",
            "b3",
            "b4",
            "b5",
            "blueHome",
          ],
          tokensPos: new Map(
            Array.from(document.querySelectorAll("img[token='blue']")).map(
              (el) => [el, null],
            ),
          ),
        },
        yellow: {
          tokens: Array.from(document.querySelectorAll("img[token='yellow']")),
          tokensWon: [],
          path: [
            ...Array.from(
              { length: 51 },
              (_, i) => ((i + 38) % 52) + 1
            ),
            "y1",
            "y2",
            "y3",
            "y4",
            "y5",
            "yellowHome",
          ],
          tokensPos: new Map(
            Array.from(document.querySelectorAll("img[token='yellow']")).map(
              (el) => [el, null],
            ),
          ),
        },
      };

      // current player

      function animate(player) {
        playerKaGhar = document.querySelector(`.${player}kaghar`);
        playerKaGhar.classList.add("flashAnimate");
      }

      function removeFlashAnimation(player) {
        playerKaGhar = document.querySelector(`.${player}kaghar`);
        playerKaGhar.classList.remove("flashAnimate");
      }

      let currentPlayer = null;
      function changeCurrentPlayer() {
        if (currentPlayer == undefined) {
          currentPlayer = "red";
          return animate(currentPlayer);
        }

        const allPlayers = ["red", "green", "yellow", "blue"];
        // check if there are at least two players left with tokensWon < 4
        const playersRemaining = allPlayers.filter(
          (player) => account[player].tokensWon.length < 4,
        );

        if (playersRemaining.length >= 2) {
          console.log("Yes we can change players!");
          removeFlashAnimation(currentPlayer);
          newPlayersIndex =
            (playersRemaining.indexOf(currentPlayer) + 1) %
            playersRemaining.length;
          currentPlayer = playersRemaining[newPlayersIndex];
          animate(currentPlayer);
        } else {
          alert("Game Over!");
        }
      }
      changeCurrentPlayer();
      // ---------------

      // Dice -----------------

      let diceResult = null;
      let canDiceRoll = true;

      const dice = document.getElementById("dice");
      dice.addEventListener("click", () => {
        dice.src = "./images/dice/rolling_dice.gif";
        setTimeout(() => {
          diceResult = Math.floor(Math.random() * 6) + 1;
          dice.src = `./images/dice/face${diceResult}.png`;
          canDiceRoll = false;
          // check if there is any token of the current player that can be moved further agr nhi hai to chage the player and make the dice roll

          let moveAbleToken = false;
          if (diceResult == 6) {
            moveAbleToken = account[currentPlayer].tokens.some(
              (el) => account[currentPlayer].tokensPos.get(el) == null,
            );
          } else {
            moveAbleToken = account[currentPlayer].tokens.some((el) => {
              let currentPos = account[currentPlayer].tokensPos[el];
              if (currentPos + diceResult <= 56) return true;
            });
          }

          if (!moveAbleToken) {
            changeCurrentPlayer();
            canDiceRoll = true;
          }
        }, 300);
      });

      // -----------------------

      console.log(account);
      const allTokens = allCells.forEach((cell) => {
        cell.addEventListener("click", () => {
          console.log(cell.getAttribute("cellNo"));

          const tokenToMove = Array.from(cell.querySelectorAll("img")).find(
            (token) => token.getAttribute("token") == currentPlayer,
          );

          const currentPos = account[currentPlayer].tokensPos.get(tokenToMove);
          if (currentPos == null && diceResult == 6) {
            const cellNo = account[currentPlayer].path[0];
            const cellToMove = document.querySelector(
              `div[cellNo="${cellNo}"]`
            );

            cellToMove.append(tokenToMove);
            console.log(cellToMove,"idhar jana tha ")
            console.log("Cell number ye tha: ", cellNo  )
            console.log("selector: ", `div[cellNo="${cellNo}"]`)
          }

          console.log(currentPos);
        });
      });

      // How to ensure if there is at least one token that can be moved by the current dice face ----- you have to ignore token won so each time a token is won you have to move it from the tokens property to the tokenswon property of the current player
      /*
        for all the tokens of the current player check their account.
        if they are null and the dice is not 6 ignore

        if they are not null then when we add the current dice result to the current token position and if they fall within the moveable path then the token can be moved

        if there is a single token moveable just wait till the player plays his/her part

      
      */

      // when a cell is clicked:
      /*
      
        Look for any token of the current player that might be in the cell clicked. if there is one and can be moved just move it.

        => a token can be moved if it's in the home spot and the dice result is 6 or it is in any cell and the dice result added to the currentcell index falls within the moveable path range of the current player

        if not then just ignore


      
      */

      // if the destination cell contains a single token of any other player not double then we have to move the token to the players home spots

      // if the destination is winCell we will increment the number of tokens won by the current player in his account and in the changecurrent player function we will exlude the player if the numberOftokensWon is equalt to 4 thereby allowing only the players who have tokens to win to play
    </script>
